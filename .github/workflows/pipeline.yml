# Deploy: ustaw Variables — PROD_DOMAIN; opcjonalnie PROD_ALLOWED_HOSTS (inaczej domyślna lista z domeną).
# Sekrety Swarm (external) i SSH: bez zmian w repozytorium poza PROD_SSH_*.

name: pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docker.txt

      - name: Backend tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings_test
        run: python manage.py test --no-input

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests
        working-directory: frontend
        run: npm run test

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - run-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image repo name
        id: image-repo
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          NAME_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "frontend_image=ghcr.io/${OWNER_LC}/${NAME_LC}-frontend" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (demo)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          build-args: |
            VITE_USE_MOCK_DATA_FETCHER=true
          push: true
          tags: ${{ steps.image-repo.outputs.frontend_image }}:demo
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    steps:
      - uses: actions/checkout@v4

      - name: Docker Stack Deploy
        uses: cssnr/stack-deploy-action@v1
        env:
          DOMAIN: ${{ vars.PROD_DOMAIN }}
          ALLOWED_HOSTS: ${{ vars.PROD_ALLOWED_HOSTS != '' && vars.PROD_ALLOWED_HOSTS || format('localhost,127.0.0.1,backend,{0}', vars.PROD_DOMAIN) }}
        with:
          name: stocksense
          file: docker/docker-stack.prod.yaml
          host: ${{ secrets.PROD_SSH_HOST }}
          user: ${{ secrets.PROD_SSH_USER }}
          ssh_key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT != '' && secrets.PROD_SSH_PORT || '22' }}
          registry_auth: true
          registry_host: ghcr.io
          registry_user: ${{ github.actor }}
          registry_pass: ${{ secrets.GITHUB_TOKEN }}